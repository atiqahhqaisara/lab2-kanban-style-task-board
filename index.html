<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task Board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>My Task Board <span id="task-count">0</span></h1>

  <select id="priorityFilter">
    <option value="all">All</option>
    <option value="high">High</option>
    <option value="medium">Medium</option>
    <option value="low">Low</option>
  </select>
</header>

<!-- COLUMNS -->
<div class="board">

<section id="todo">
  <h2>To Do</h2>
  <ul class="task-list"></ul>
  <button class="add-btn">Add Task</button>
</section>

<section id="inprogress">
  <h2>In Progress</h2>
  <ul class="task-list"></ul>
  <button class="add-btn">Add Task</button>
</section>

<section id="done">
  <h2>Done</h2>
  <ul class="task-list"></ul>
  <button class="add-btn">Add Task</button>
  <button id="clearDone">Clear All</button>
</section>
</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
	<div class="modal-content">
		<h3>Task</h3>
  		<input id="titleInput" placeholder="Title">
  		<textarea id="descInput" placeholder="Description"></textarea>

  <select id="priorityInput">
    <option value="high">High</option>
    <option value="medium">Medium</option>
    <option value="low">Low</option>
  </select>

  <input type="date" id="dateInput">
<div class="modal-actions">
  <button id="saveBtn">Save</button>
  <button id="cancelBtn">Cancel</button>
</div>
</div>
</div>

<script src="taskmanager.js"></script>
</body>
</html>
